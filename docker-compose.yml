# Local full-stack run: docker compose up --build
# Serves API + SPA + SQLite on http://localhost:3000
# Auth is bypassed when CF_TEAM_DOMAIN/CF_ACCESS_AUD are empty.
services:
  app:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      NODE_ENV: production
      DATABASE_URL: /data/bmad-todo.db
      CF_TEAM_DOMAIN: ""
      CF_ACCESS_AUD: ""
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 2s
      start_period: 10s
      retries: 3
